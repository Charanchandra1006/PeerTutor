# ═══════════════════════════════════════════════════════════════
# PTM Platform — Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ── MongoDB with Replica Set ──
  mongodb:
    image: mongo:7
    container_name: ptm-mongodb
    volumes:
      - mongodb_data:/data/db
      - ./infra/mongo/rs-init.sh:/scripts/rs-init.sh:ro
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ptm-network

  # ── MongoDB Replica Set Init ──
  mongo-init:
    image: mongo:7
    container_name: ptm-mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      mongosh --host mongodb:27017 --eval '
        try {
          rs.status();
          print("Replica set already initialized");
        } catch(e) {
          rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] });
          print("Replica set initiated");
        }
      '
    restart: "no"
    networks:
      - ptm-network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: ptm-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass "${REDIS_PASSWORD:-securepassword123}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-securepassword123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ptm-network

  # ── Backend API (Production) ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ptm-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:securepassword123@redis:6379
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    command: node src/server.js
    restart: unless-stopped
    networks:
      - ptm-network

  # ── Frontend (Production — served by Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ptm-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ptm-network

  # ── AI Engine (FastAPI — Production) ──
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: ptm-ai-engine
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:securepassword123@redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped
    networks:
      - ptm-network

  # ── BullMQ Worker (Production) ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ptm-worker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:securepassword123@redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: node src/jobs/worker.js
    restart: unless-stopped
    networks:
      - ptm-network

volumes:
  mongodb_data:
  redis_data:

networks:
  ptm-network:
    driver: bridge
